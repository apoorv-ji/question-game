<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Game</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    width: 700px;
    height: 400px;
    position: relative;
}

h1 {
    margin-bottom: 50px;
}

button {
    padding: 15px 35px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
}

#correctBtn {
    background: #4caf50;
    color: white;
    margin-right: 20px;
}

#wrongBtn {
    background: #f44336;
    color: white;
    position: absolute;
    left: 380px;
    top: 180px;
    transition: all 0.15s ease;
}

#message {
    margin-top: 50px;
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>Soorrryyyyyyyy, Please Manjaaa Cuutttuuuuu!!! 🥹</h1>

    <button id="correctBtn">Accepted</button>
    <button id="wrongBtn">Noooooo</button>

    <div id="message"></div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqkgSXj9wiDyXs_aVYOI6R4eAmT7FTy_M",
  authDomain: "question-game-af745.firebaseapp.com",
  projectId: "question-game-af745",
  storageBucket: "question-game-af745.firebasestorage.app",
  messagingSenderId: "7082471650",
  appId: "1:7082471650:web:e82757e2cf241821ff2ebb",
  measurementId: "G-11TM0N7KYE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const wrongBtn = document.getElementById("wrongBtn");
const correctBtn = document.getElementById("correctBtn");
const message = document.getElementById("message");
const container = document.querySelector(".container");

function moveButton() {
    const maxX = container.clientWidth - wrongBtn.offsetWidth;
    const maxY = container.clientHeight - wrongBtn.offsetHeight;

    wrongBtn.style.left =
        Math.floor(Math.random() * maxX) + "px";

    wrongBtn.style.top =
        Math.floor(Math.random() * maxY) + "px";
}

wrongBtn.addEventListener("mouseover", moveButton);

correctBtn.addEventListener("click", async () => {

    await addDoc(
        collection(db, "responses"),
        {
            answer: "Yes",
            timestamp: new Date(),
            userAgent: navigator.userAgent
        }
    );

    message.innerHTML = "I knew it ❤️";
});

</script>

</body>
</html>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorry 🥹</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    overflow:hidden;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    min-height:550px;
    background:white;
    border-radius:30px;
    padding:30px;
    text-align:center;
    position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

.cat{
    width:180px;
    max-width:70%;
    border-radius:20px;
}

h1{
    font-size:clamp(28px,5vw,40px);
    line-height:1.4;
    margin:25px 0;
}

.buttons{
    position:relative;
    height:220px;
    margin-top:20px;
}

button{
    border:none;
    border-radius:999px;
    padding:16px 34px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:all .25s ease;
}

#correctBtn{
    background:#4caf50;
    color:white;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:120px;
}

#wrongBtn{
    background:#f44336;
    color:white;
    position:absolute;
    left:65%;
    top:40px;
    transform-origin:center;
}

#message{
    margin-top:20px;
    min-height:40px;
    font-size:22px;
    font-weight:bold;
    color:#e91e63;
}

.heart{
    position:fixed;
    bottom:-50px;
    font-size:30px;
    animation:floatUp linear forwards;
    pointer-events:none;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

.success{
    animation:pop .5s ease;
}

@keyframes pop{
    0%{
        transform:scale(.5);
    }

    100%{
        transform:scale(1);
    }
}

</style>

</head>

<body>

<div class="container">

<img
    src="https://media.tenor.com/WN7L5RjD6YAAAAAM/cute-cat.gif"
    class="cat"
    alt="Cute Cat"
>

<h1>
    Soorrryyyyyyyy 🥹<br>
    Please Manjaaa Cuutttuuuuu ❤️
</h1>

<div class="buttons">

    <button id="correctBtn">
        Accepted 🙈
    </button>

    <button id="wrongBtn">
        Noooooo 😭
    </button>

</div>

<div id="message"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqkgSXj9wiDyXs_aVYOI6R4eAmT7FTy_M",
  authDomain: "question-game-af745.firebaseapp.com",
  projectId: "question-game-af745",
  storageBucket: "question-game-af745.firebasestorage.app",
  messagingSenderId: "7082471650",
  appId: "1:7082471650:web:e82757e2cf241821ff2ebb",
  measurementId: "G-11TM0N7KYE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const wrongBtn = document.getElementById("wrongBtn");
const correctBtn = document.getElementById("correctBtn");
const message = document.getElementById("message");
const container = document.querySelector(".buttons");

let attempt = 0;

const funnyMessages = [
    "Are you sure? 🥺",
    "Think again 😭",
    "Pleaseeeee 🥹",
    "One more chance 🥹",
    "Manjaaa Cuutttuuuuu 😭",
    "No is disabled today 😏",
    "Accepted looks better 😍",
    "Come onnnn 😭",
    "You're running out of options 😂",
    "Just press Accepted 😎"
];

function createHeart() {

    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "😇";

    heart.style.left =
        Math.random() * window.innerWidth + "px";

    heart.style.animationDuration =
        (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 800);

function moveButton() {

    attempt++;

    const maxX =
        container.clientWidth - wrongBtn.offsetWidth;

    const maxY =
        container.clientHeight - wrongBtn.offsetHeight;

    wrongBtn.style.left =
        Math.random() * maxX + "px";

    wrongBtn.style.top =
        Math.random() * maxY + "px";

    const yesScale =
        1 + (attempt * 0.08);

    const noScale =
        Math.max(
            0.2,
            1 - (attempt * 0.07)
        );

    correctBtn.style.transform =
        `translateX(-50%) scale(${yesScale})`;

    wrongBtn.style.transform =
        `scale(${noScale})`;

    wrongBtn.style.opacity =
        Math.max(
            0.15,
            1 - (attempt * 0.08)
        );

    message.innerHTML =
        funnyMessages[
            Math.min(
                attempt - 1,
                funnyMessages.length - 1
            )
        ];

    if (attempt > 12) {
        wrongBtn.innerHTML = "🥺";
    }

    if (attempt > 18) {
        wrongBtn.innerHTML = "🤏";
    }

    if (attempt > 25) {
        wrongBtn.style.display = "none";
        message.innerHTML =
            "Looks like there's only one option left 🙈";
    }
}

wrongBtn.addEventListener(
    "mouseenter",
    moveButton
);

wrongBtn.addEventListener(
    "touchstart",
    (e) => {
        e.preventDefault();
        moveButton();
    }
);

correctBtn.addEventListener(
    "click",
    async () => {

        try {

            await addDoc(
                collection(db, "responses"),
                {
                    answer: "Accepted",
                    timestamp: new Date()
                }
            );

        } catch(err) {
            console.log(err);
        }

        confetti({
            particleCount: 300,
            spread: 180,
            origin: { y: 0.6 }
        });

        document.querySelector(".container").innerHTML = `
            <div class="success">

                <img
                src="https://media.tenor.com/8M0M4Q4N6N0AAAAM/cat-love.gif"
                style="width:220px;border-radius:20px;">

                <h1>
                    Yayyyyy 😍
                </h1>

                <p style="font-size:24px;">
                    Thank youuuuuuu 🥳
                </p>

            </div>
        `;
    }
);

</script>

</body>
</html>
